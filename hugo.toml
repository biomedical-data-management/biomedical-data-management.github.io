baseURL = "https://biodms.org/"
languageCode = "en-us"
title = "Biomedical Data Management Systems | Workshop @ VLDB 2026"
theme = "cotton-sky"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]
[params]
  math = true
